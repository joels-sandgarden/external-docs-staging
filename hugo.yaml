# Site config for the Doc Holiday documentation STAGING site, ported from the dspy-docs skeleton.
# baseURL is a placeholder until a Cloudflare Pages project / domain exists;
# `hugo server` ignores it locally.
baseURL: https://joels-sandgarden.github.io/external-docs-staging/

theme: E25DX

enableGitInfo: true
enableRobotsTXT: true

disableKinds: [section, taxonomy, term]

defaultContentLanguage: en

languages:
  en:
    weight: 1
    label: English
    locale: en-US
    contentDir: content/en
    title: Doc Holiday Documentation
    params:
      description: Documentation for Doc Holiday — docs and release notes that write themselves

# To omit the Google Analytics script, keep a ~ in place of the G-XXXXXXXXXX below.
services:
  googleAnalytics:
    ID: ~

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    parser:
      attribute:
        block: true
        title: true
    # Relative *.md cross-links between the generated pages are resolved to
    # page URLs by layouts/_markup/render-link.html (overrides the theme hook).
  tableOfContents:
    pre: <nav id="TableOfContents" aria-label="Table of Contents">
    post: </nav>

# Serves each doc page as plain Markdown at <page>/index.md, alongside the
# normal HTML at <page>/index.html, for LLMs to fetch/index directly.
outputFormats:
  markdown:
    mediaType: text/markdown
    baseName: index
    isPlainText: true
    isHTML: false

outputs:
  page:
    - html
    - markdown

params:
  project:
    # To omit the startYear, put a ~ in its place.
    startYear: ~
    presentYear: 2026
    repo:
      main: https://github.com/joels-sandgarden/external-docs-staging
    themeColor:
      light: '#ffffff'
      dark: '#14161a'

  author:
    name: doc.holiday
    url: https://doc.holiday

  logo: /logo.svg

  pagination:
    size: 6

  enableOGXSEO: false # No automated OG image generation
  enablePageFind: false # Bootstrap ships without search; run `pagefind --site public` after build to enable

menus:
  main:
    # Use explicit `url`s (not pageRef): the docs section page kind is disabled,
    # so pageRef:/docs can't resolve and would fall back to the home URL.
    - identifier: home
      name: Home
      url: /
      weight: 1
      params:
        icon: home
    - identifier: docs
      name: Field Guide
      url: /docs/the-big-picture/
      weight: 2
      params:
        icon: menu_book
